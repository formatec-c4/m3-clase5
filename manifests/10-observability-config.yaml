apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: observability-lab
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      filelog:
        include:
          - /var/log/pods/observability-lab_*/*/*.log
        start_at: end
        include_file_path: true
        include_file_name: false
        operators:
          - type: container
          - type: regex_parser
            parse_from: attributes["log.file.path"]
            regex: '^/var/log/pods/(?P<namespace>[^_]+)_(?P<pod>[^_]+)_(?P<uid>[^/]+)/(?P<container>[^/]+)/(?P<restart_count>[0-9]+)\.log$'

    processors:
      transform/logs:
        log_statements:
          - context: log
            statements:
              - set(resource.attributes["service.name"], log.attributes["container"])
              - set(resource.attributes["service.namespace"], "formatec")
              - set(resource.attributes["deployment.environment"], "docker-desktop")
              - set(resource.attributes["k8s.namespace.name"], log.attributes["namespace"])
              - set(resource.attributes["k8s.pod.name"], log.attributes["pod"])
              - set(resource.attributes["k8s.container.name"], log.attributes["container"])
      batch:

    exporters:
      otlp/tempo:
        endpoint: tempo:4317
        tls:
          insecure: true
      otlphttp/loki:
        endpoint: http://loki:3100/otlp
        tls:
          insecure: true
      prometheus:
        endpoint: 0.0.0.0:8889
        namespace: formatec
      debug:
        verbosity: basic

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp/tempo]
        logs:
          receivers: [filelog]
          processors: [transform/logs, batch]
          exporters: [otlphttp/loki]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: observability-lab
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: otel-collector
        static_configs:
          - targets: ["otel-collector:8889"]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: observability-lab
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
      grpc_listen_port: 9095

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

    storage:
      trace:
        backend: local
        wal:
          path: /tmp/tempo/wal
        local:
          path: /tmp/tempo/blocks
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: observability-lab
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    common:
      path_prefix: /tmp/loki
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
      storage:
        filesystem:
          chunks_directory: /tmp/loki/chunks
          rules_directory: /tmp/loki/rules

    schema_config:
      configs:
        - from: 2024-04-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    limits_config:
      allow_structured_metadata: true
      volume_enabled: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability-lab
data:
  datasources.yaml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true

      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki:3100
        jsonData:
          derivedFields:
            - name: TraceID
              matcherRegex: "trace_id=([a-f0-9]{32})"
              datasourceUid: tempo
              url: "$${__value.raw}"

      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://tempo:3200
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: "-5m"
            spanEndTimeShift: "5m"
            filterByTraceID: true
            filterBySpanID: false
          serviceMap:
            datasourceUid: prometheus
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: observability-lab
data:
  dashboards.yaml: |
    apiVersion: 1

    providers:
      - name: FormaTEC
        orgId: 1
        folder: FormaTEC
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-observability
  namespace: observability-lab
data:
  observability-lab.json: |
    {
      "uid": "formatec-observability-lab",
      "title": "FormaTEC - Observabilidad end to end",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "5s",
      "time": {
        "from": "now-30m",
        "to": "now"
      },
      "tags": ["formatec", "opentelemetry", "kubernetes"],
      "templating": {
        "list": [
          {
            "name": "service",
            "label": "Servicio",
            "type": "custom",
            "query": "front,backend,catalog",
            "current": {"text": "front", "value": "front"},
            "includeAll": true,
            "allValue": "front|backend|catalog",
            "multi": false
          },
          {
            "name": "trace_id",
            "label": "Trace ID o regex",
            "type": "textbox",
            "query": ".",
            "current": {"text": ".", "value": "."}
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "text",
          "title": "Uso del dashboard",
          "gridPos": {"h": 5, "w": 24, "x": 0, "y": 0},
          "options": {
            "mode": "markdown",
            "content": "1. Generar trafico desde el front.\\n2. Si aparece un error, copiar el `trace_id` desde el panel de logs.\\n3. Pegar el `trace_id` en la variable de arriba.\\n4. Los paneles de logs quedan filtrados por esa request.\\n5. Usar el link TraceID si se quiere ver el recorrido completo."
          }
        },
        {
          "id": 2,
          "type": "gauge",
          "title": "Requests totales",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 8, "x": 0, "y": 5},
          "targets": [
            {
              "refId": "A",
              "expr": "sum(formatec_demo_http_requests_total)"
            }
          ],
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "min": 0,
              "color": {"mode": "palette-classic"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null}
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 3,
          "type": "gauge",
          "title": "Errores 5xx",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 8, "x": 8, "y": 5},
          "targets": [
            {
              "refId": "A",
              "expr": "sum(formatec_demo_http_requests_total{http_status_code=~\"5..\"})"
            }
          ],
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "min": 0,
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 4,
          "type": "gauge",
          "title": "Servicios activos",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 8, "x": 16, "y": 5},
          "targets": [
            {
              "refId": "A",
              "expr": "count(count by (service_name) (formatec_demo_http_requests_total))"
            }
          ],
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "min": 0,
              "max": 3,
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 1},
                  {"color": "green", "value": 3}
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Requests por minuto",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 10},
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (service_name) (increase(formatec_demo_http_requests_total[1m]))",
              "legendFormat": "{{service_name}}"
            }
          ],
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom", "showLegend": true},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "min": 0,
              "custom": {
                "drawStyle": "bars",
                "fillOpacity": 35,
                "lineWidth": 1,
                "pointSize": 4,
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {"mode": "normal", "group": "A"}
              }
            },
            "overrides": []
          }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Errores por minuto",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 10},
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (service_name) (increase(formatec_demo_http_requests_total{http_status_code=~\"5..\"}[1m]))",
              "legendFormat": "{{service_name}}"
            }
          ],
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom", "showLegend": true},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "min": 0,
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              },
              "custom": {
                "drawStyle": "bars",
                "fillOpacity": 45,
                "lineWidth": 1,
                "pointSize": 4,
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {"mode": "normal", "group": "A"}
              }
            },
            "overrides": []
          }
        },
        {
          "id": 7,
          "type": "logs",
          "title": "Logs filtrables por servicio y trace_id",
          "datasource": {"type": "loki", "uid": "loki"},
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 18},
          "targets": [
            {
              "refId": "A",
              "expr": "{service_name=~\"$service\"} |~ \"$trace_id\""
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": false,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "dedupStrategy": "none",
            "sortOrder": "Descending"
          }
        },
        {
          "id": 8,
          "type": "logs",
          "title": "Logs de error",
          "datasource": {"type": "loki", "uid": "loki"},
          "gridPos": {"h": 9, "w": 24, "x": 0, "y": 28},
          "targets": [
            {
              "refId": "A",
              "expr": "{service_name=~\"$service\"} |~ \"ERROR|error|failed\""
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": false,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "dedupStrategy": "none",
            "sortOrder": "Descending"
          }
        }
      ]
    }
